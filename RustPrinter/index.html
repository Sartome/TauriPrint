<!doctype html>
<html lang="fr" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bulk Printer</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Chargement de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-900 dark:to-slate-950 text-slate-800 dark:text-slate-200 font-sans h-screen flex flex-col items-center py-10 px-4 transition-colors duration-500">
    
    <div class="max-w-3xl w-full bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl rounded-2xl shadow-2xl overflow-hidden flex flex-col h-full border border-white/20 dark:border-slate-700/50 transition-colors duration-500">
      
      <!-- En-tête -->
      <div class="bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-indigo-800 dark:to-blue-900 px-6 py-5 flex justify-between items-center transition-colors duration-500 shadow-md">
        <h1 class="text-2xl font-extrabold text-white flex items-center gap-3 drop-shadow-sm">
          <img src="/TauriPrint.png" alt="TauriPrint Logo" class="h-12 w-auto object-contain drop-shadow-md">
          TauriPrint
        </h1>
        <button id="theme-toggle" class="text-white hover:text-blue-200 p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-white/50 transition-all hover:scale-110 active:scale-95 bg-white/10 hover:bg-white/20">
          <!-- Icône Lune -->
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
          <!-- Icône Soleil -->
          <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        </button>
      </div>

      <div class="p-6 flex-1 flex flex-col gap-6 overflow-y-auto custom-scrollbar">
        
        <!-- Zone de sélection d'imprimante -->
        <div>
          <label for="printer-select" class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">1. Imprimante de destination</label>
          <div class="flex gap-2 items-center">
            <select id="printer-select" class="flex-1 w-full border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm dark:text-white shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium">
              <option value="">Chargement des imprimantes...</option>
            </select>
            <button id="toggle-options-btn" class="p-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white/50 dark:bg-slate-800/50 hover:bg-blue-50 dark:hover:bg-slate-700 transition-all text-slate-600 dark:text-slate-300 shadow-sm hover:shadow-md hover:scale-105 active:scale-95" title="Paramètres d'impression">
              ⚙️
            </button>
          </div>
        </div>

        <!-- Paramètres d'impression -->
        <div id="options-panel" class="hidden bg-slate-100/50 dark:bg-slate-800/40 border border-slate-200/80 dark:border-slate-700/80 rounded-xl p-5 grid grid-cols-2 gap-4 transition-all shadow-inner">
          
          <!-- Ligne Profils & Planificateur -->
          <div class="col-span-2 grid grid-cols-2 gap-4 border-b border-slate-200 dark:border-slate-700 pb-4 mb-2">
            <div>
              <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider">Profils d'impression</label>
              <div class="flex gap-2">
                <select id="opt-profile" class="flex-1 border border-slate-200 dark:border-slate-600 rounded-lg px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                  <option value="">-- Défaut --</option>
                </select>
                <button id="save-profile-btn" class="bg-blue-100/80 dark:bg-indigo-900/40 text-blue-700 dark:text-indigo-300 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-200 dark:hover:bg-indigo-800 transition-all shadow-sm active:scale-95">💾 Sauver</button>
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider">Planifier (Heure)</label>
              <input type="time" id="opt-schedule" class="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-1.5 text-sm bg-white dark:bg-slate-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider">Copies</label>
            <input type="number" id="opt-copies" min="1" max="99" value="1" class="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-1.5 text-sm bg-white dark:bg-slate-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider">Couleur</label>
            <select id="opt-color" class="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-1.5 text-sm bg-white dark:bg-slate-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
              <option value="true">Couleur</option>
              <option value="false">Noir & Blanc</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider">Recto-Verso</label>
            <select id="opt-duplex" class="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-1.5 text-sm bg-white dark:bg-slate-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
              <option value="OneSided">Simple face</option>
              <option value="TwoSidedLongEdge">Bord long</option>
              <option value="TwoSidedShortEdge">Bord court</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider">Format</label>
            <select id="opt-paper" class="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-1.5 text-sm bg-white dark:bg-slate-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
              <option value="A4">A4</option>
              <option value="A3">A3</option>
              <option value="Letter">Letter</option>
            </select>
          </div>

          <!-- Ligne Extra Options -->
          <div class="col-span-2 flex flex-col gap-2 mt-2 pt-3 border-t border-slate-200 dark:border-slate-700">
            <label class="flex items-center gap-2 text-sm font-medium text-slate-700 dark:text-slate-300 cursor-pointer hover:text-blue-600 transition-colors">
              <input type="checkbox" id="opt-merge-pdf" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4 transition-all">
              Fusionner en un seul PDF <span class="text-xs text-slate-400">(Recommandé pour les gros lots)</span>
            </label>
            <label class="flex items-center gap-2 text-sm font-medium text-slate-700 dark:text-slate-300 cursor-pointer hover:text-blue-600 transition-colors">
              <input type="checkbox" id="opt-slip-sheets" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4 transition-all">
              Intercaler des pages de garde <span class="text-xs text-slate-400">(Séparateurs de documents)</span>
            </label>
          </div>
        </div>

        <!-- Zone de liste de fichiers -->
        <div class="flex-1 flex flex-col">
          <div class="flex justify-between items-end mb-3">
            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300">2. Fichiers à imprimer</label>
            <div class="flex gap-2 items-center">
              <button id="filter-pdf-btn" class="bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-xs font-semibold text-slate-600 dark:text-slate-300 px-2.5 py-1 rounded-md transition-all active:scale-95 shadow-sm">📄 Uniquement PDF</button>
              <button id="filter-img-btn" class="bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-xs font-semibold text-slate-600 dark:text-slate-300 px-2.5 py-1 rounded-md transition-all active:scale-95 shadow-sm">❌ Ignorer Images</button>
              <button id="sort-btn" class="bg-blue-50 hover:bg-blue-100 dark:bg-indigo-900/30 dark:hover:bg-indigo-900/60 text-xs font-bold text-blue-600 dark:text-indigo-400 px-2.5 py-1 rounded-md transition-all flex items-center gap-1 active:scale-95 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12" />
                </svg>
                Trier A-Z
              </button>
            </div>
          </div>
          
          <div id="drop-zone" class="flex-1 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl flex flex-col items-center justify-center bg-slate-50/50 dark:bg-slate-800/30 text-slate-500 dark:text-slate-400 mb-4 transition-all hover:bg-blue-50 dark:hover:bg-indigo-900/20 hover:border-blue-400 dark:hover:border-indigo-500 cursor-pointer group shadow-inner">
            <div class="p-4 bg-white dark:bg-slate-700 rounded-full shadow-sm mb-3 group-hover:scale-110 group-hover:shadow-md transition-all">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500 dark:text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
            </div>
            <p class="font-medium group-hover:text-blue-600 dark:group-hover:text-indigo-400 transition-colors">Glissez vos dossiers ou fichiers ici</p>
          </div>
          
          <ul id="file-list" class="space-y-2 overflow-y-auto max-h-48 pr-1 custom-scrollbar">
            <!-- Les fichiers apparaîtront ici -->
          </ul>
        </div>

      </div>

      <!-- Barre d'action -->
      <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md px-6 py-4 border-t border-slate-100 dark:border-slate-700 flex justify-between items-center transition-colors duration-500 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="flex items-center gap-4">
          <div class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></div>
          <p id="status-message" class="text-sm font-semibold text-slate-600 dark:text-slate-300">Prêt.</p>
          <button id="export-logs-btn" class="hidden text-xs font-bold text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 transition-colors underline decoration-indigo-300 decoration-2 underline-offset-2">Exporter le rapport</button>
        </div>
        <button id="print-btn" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-extrabold py-2.5 px-8 rounded-xl shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 transition-all hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:shadow-none">
          Lancer l'impression
        </button>
      </div>

    </div>

    <!-- Modal de Fin d'impression -->
    <div id="print-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/40 dark:bg-slate-900/60 backdrop-blur-sm transition-opacity duration-300 opacity-0">
      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-6 w-full max-w-sm mx-4 transform scale-95 transition-transform duration-300 border border-slate-100 dark:border-slate-700" id="print-modal-content">
        <h2 class="text-2xl font-extrabold text-slate-800 dark:text-white mb-1 flex items-center gap-2">
          🎉 Impression terminée
        </h2>
        <p class="text-sm text-slate-500 dark:text-slate-400 mb-5">Voici le bilan de votre lot.</p>
        
        <div class="flex flex-col gap-3 mb-6">
          <div class="flex justify-between items-center bg-green-50 dark:bg-green-900/20 p-3.5 rounded-xl border border-green-100 dark:border-green-800/50">
            <span class="text-green-700 dark:text-green-400 font-bold flex items-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
              Succès
            </span>
            <span id="modal-success-count" class="text-green-800 dark:text-green-300 font-extrabold text-xl">0</span>
          </div>
          <div class="flex justify-between items-center bg-red-50 dark:bg-red-900/20 p-3.5 rounded-xl border border-red-100 dark:border-red-800/50">
            <span class="text-red-700 dark:text-red-400 font-bold flex items-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
              Échecs
            </span>
            <span id="modal-error-count" class="text-red-800 dark:text-red-300 font-extrabold text-xl">0</span>
          </div>
        </div>
        
        <div class="flex flex-col gap-2">
          <button id="modal-clean-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-600/20 transition-all hover:-translate-y-0.5 active:translate-y-0">
            Nettoyer la file et Fermer
          </button>
          <button id="modal-close-btn" class="w-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-bold py-3 rounded-xl transition-all active:scale-95">
            Fermer
          </button>
        </div>
      </div>
    </div>

    <!-- Script principal -->
    <script type="module" src="/src/main.ts"></script>
    
    <style>
      /* Custom scrollbar pour la liste */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 20px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #475569;
      }
    </style>
  </body>
</html>
